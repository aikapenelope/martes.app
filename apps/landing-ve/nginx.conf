server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # ----- gzip -----
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/html
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

  # ----- security headers -----
  add_header X-Frame-Options        "SAMEORIGIN"                        always;
  add_header X-Content-Type-Options "nosniff"                           always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
  add_header X-XSS-Protection       "1; mode=block"                     always;
  server_tokens off;

  # ----- /index.html: no-cache so deploys take effect immediately -----
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma        "no-cache";
    add_header Expires       "0";
  }

  # ----- hashed assets: 1y immutable -----
  location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
    expires    1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ----- images: 30d -----
  location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
    expires    30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ====================================================================
  # ROUTING (single domain martes.app)
  # ====================================================================
  #   /              → VE landing (primary, in ./index.html)
  #   /us-version/   → US landing (in ./us-version/index.html)
  #   /blog/         → US blog (in ./blog/index.html)
  #   /blog/<slug>/  → US blog post (in ./blog/<slug>/index.html)
  #   /docs/         → US docs (in ./docs/index.html)
  #   /docs/<slug>/  → US docs page (in ./docs/<slug>/index.html)
  #   /robots.txt, /sitemap.xml → VE primary
  # ====================================================================

  # ---- US blog ----
  location /blog {
    try_files $uri $uri/ $uri.html /blog/index.html;
  }

  # ---- US docs ----
  location /docs {
    try_files $uri $uri/ $uri.html /docs/index.html;
  }

  # ---- US version (original US landing) ----
  location = /us-version {
    return 301 /us-version/;
  }
  location /us-version {
    try_files $uri $uri/ $uri.html /us-version/index.html;
  }

  # ---- VE primary: catch-all ----
  # Anything not matched above (and not /blog, /docs, /us-version) is the VE landing
  location / {
    try_files $uri $uri/ $uri.html /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # ----- block hidden files (.git, .env) -----
  location ~ /\. {
    deny all;
    return 404;
  }
}
