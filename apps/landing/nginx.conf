server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # ---------------------------------------------------------------------------
  # Gzip — reduce payload ~65-70% en texto/JS/CSS
  # ---------------------------------------------------------------------------
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_min_length 256;
  gzip_types
        text/plain
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

  # ---------------------------------------------------------------------------
  # Security headers
  # ---------------------------------------------------------------------------
  add_header X-Frame-Options        "SAMEORIGIN"                      always;
  add_header X-Content-Type-Options "nosniff"                         always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
  server_tokens off;

  # ---------------------------------------------------------------------------
  # Cache
  # ---------------------------------------------------------------------------
  # index.html: no-cache (each deploy takes effect immediately)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma        "no-cache";
    add_header Expires       "0";
  }

  # hashed assets: 1y immutable
  location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
    expires    1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # images: 30d
  location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
    expires    30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ---------------------------------------------------------------------------
  # Routes (single domain martes.app)
  #   /              → VE landing (primary)
  #   /us/           → original US landing
  #   /blog/         → US blog
  #   /docs/         → US docs
  # ---------------------------------------------------------------------------

  # /blog/  /blog/<slug>/
  location /blog {
    try_files $uri $uri/ $uri.html /blog/index.html;
  }

  # /docs/  /docs/<slug>/
  location /docs {
    try_files $uri $uri/ $uri.html /docs/index.html;
  }

  # /us/  (with /us → /us/ redirect)
  location = /us {
    return 301 /us/;
  }
  location /us {
    try_files $uri $uri/ $uri.html /us/index.html;
  }

  # /  (VE primary, catch-all)
  location / {
    try_files $uri $uri/ $uri.html /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # block hidden files
  location ~ /\. {
    deny all;
    return 404;
  }
}
