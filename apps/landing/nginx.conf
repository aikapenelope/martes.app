server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # ---------------------------------------------------------------------------
    # Gzip — reduce tamaño del HTML (~33 KB → ~10 KB aprox)
    # ---------------------------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 256;

    # ---------------------------------------------------------------------------
    # Security headers
    # X-Frame-Options    — previene clickjacking (no se puede embeber en iframe)
    # X-Content-Type     — previene MIME sniffing
    # Referrer-Policy    — limita qué info de referrer se comparte
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

    # ---------------------------------------------------------------------------
    # Rutas
    # ---------------------------------------------------------------------------

    # HTML principal — sin cache para que los deploys tomen efecto inmediatamente
    location / {
        try_files  $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Assets estáticos (cuando se añadan imágenes, CSS, JS propios) — cache larga
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
    }

    # Ocultar versión de nginx en respuestas de error
    server_tokens off;
}
