server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # -------------------------------------------------------------------------
    # Gzip — reduce payload ~65-70% en texto/JS/CSS
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        # text/html está incluido por defecto en nginx — no se añade aquí
        # para evitar el warning "duplicate MIME type text/html"
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 256;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    # No iframes desde dominios externos (clickjacking)
    add_header X-Frame-Options        "SAMEORIGIN"                        always;
    # El browser no adivina el content-type (MIME sniffing)
    add_header X-Content-Type-Options "nosniff"                           always;
    # Qué info de URL se pasa al hacer click en links externos
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    # Oculta versión de nginx en respuestas de error
    server_tokens off;

    # -------------------------------------------------------------------------
    # Rutas
    # -------------------------------------------------------------------------

    # index.html — sin cache para que cada deploy tome efecto inmediatamente
    # (el browser siempre pide la versión fresca al servidor)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Assets con hash en nombre (bundle.abc123.js) — cache muy larga
    # Cuando se use un framework con build, los assets llevan hash → inmutables
    location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Imágenes y media
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Catch-all — SPA routing: cualquier path no encontrado → index.html
    # Necesario cuando se migre a React/Next.js/Astro con client-side routing.
    # Para un HTML estático de una sola página también funciona correctamente.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Bloquear acceso a archivos ocultos (.git, .env, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
