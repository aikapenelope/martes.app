name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy martes.app
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger deploy webhook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Secret: martes-deploy-2026" \
            -d '{"ref":"main"}' \
            http://${{ secrets.VPS_HOST }}:9876/deploy)

          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "Deploy webhook failed with status $response"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Wait and verify
        run: |
          echo "Waiting 60s for deploy to complete..."
          sleep 60
          echo "Deploy initiated. Check server logs for status."
