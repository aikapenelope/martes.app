name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build meta-agent image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      # Versions pinned to latest stable — May 2026
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/aikapenelope/martes-meta-agent
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: apps/meta-agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Trigger Coolify redeploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Patrón documentado por Coolify para GitHub Actions.
      # Requiere dos GitHub Secrets:
      #   COOLIFY_WEBHOOK — URL del webhook (Coolify UI → app → Webhooks)
      #   COOLIFY_TOKEN   — API token con permiso "deploy" (Coolify UI → Settings → API Tokens)
      # Ref: https://coolify.io/docs/applications/ci-cd/github/actions
      - name: Deploy to Coolify
        run: |
          curl --request GET "${{ secrets.COOLIFY_WEBHOOK }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
