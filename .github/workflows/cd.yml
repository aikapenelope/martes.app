name: CI — Build check

# Verifica que el Dockerfile del meta-agent compila sin errores en cada push
# y en cada PR a main.
#
# El deploy lo hace Coolify directamente: al detectar el push via GitHub App,
# Coolify clona el repo, ejecuta el build en el servidor y redespliega.
# Ref: https://coolify.io/docs/applications/ci-cd/github/auto-deploy
#
# Este workflow no sube ninguna imagen a ningún registry.
# Solo confirma que el código buildea antes de que llegue a producción.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history para detectar secrets en commits anteriores
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Detecta: bot tokens de Telegram, API keys de OpenRouter, y otros
        # formatos de credenciales hardcodeadas antes de que lleguen al servidor.
        # Ref: https://github.com/gitleaks/gitleaks-action

  build-check:
    name: Build meta-agent image
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build (no push)
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: apps/meta-agent/Dockerfile
          push: false
          # cache-from/to: reutiliza capas entre builds de CI para acelerar
          cache-from: type=gha
          cache-to: type=gha,mode=max
