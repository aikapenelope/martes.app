name: Build and Push

# Construye la imagen del meta-agent y la sube a GHCR en cada push a main.
# El redeploy lo dispara Coolify automáticamente via el GitHub App (auto-deploy).
# Ref: https://coolify.io/docs/applications/ci-cd/github/auto-deploy
#
# Notas de confiabilidad:
# - provenance: false  → evita error "unknown blob" en GHCR con BuildKit
#   Ref: https://github.com/docker/build-push-action/issues/820
# - cache-from/to      → reutiliza capas entre builds para acelerar sin romper push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build meta-agent image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ghcr.io/aikapenelope/martes-meta-agent
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: apps/meta-agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          cache-from: type=registry,ref=ghcr.io/aikapenelope/martes-meta-agent:cache
          cache-to: type=registry,ref=ghcr.io/aikapenelope/martes-meta-agent:cache,mode=max
