name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build meta-agent image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aikapenelope/martes-meta-agent
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/meta-agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Trigger Coolify redeploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Coolify webhook: GET request. La URL incluye el token — guardarla completa
      # en el GitHub Secret COOLIFY_WEBHOOK_URL.
      # Formato: https://<coolify-domain>/api/v1/deploy?uuid=<uuid>&token=<token>
      # Se obtiene en Coolify UI → proyecto → servicio → Webhooks.
      - name: Trigger Coolify webhook
        run: |
          HTTP=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X GET \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}")
          cat /tmp/resp.txt
          [ "$HTTP" = "200" ] || { echo "Coolify webhook returned HTTP $HTTP"; exit 1; }
