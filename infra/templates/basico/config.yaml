# martes.app — Template Basico ($30/mo)
# 1 plataforma (Telegram), DeepSeek V4, toolset minimo
# Optimizado para minimo token overhead

model:
  provider: openrouter
  default: deepseek/deepseek-v4-flash
  base_url: "https://openrouter.ai/api/v1"

# Toolset reducido para messaging (ahorra ~4K tokens/request)
platform_toolsets:
  telegram: [web, memory, todo, cronjob, clarify]

skills:
  creation_nudge_interval: 0  # Desactivar nudge de skills

compression:
  enabled: true
  threshold: 0.30
  target_ratio: 0.20
  protect_last_n: 10

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 1500
  user_char_limit: 1000
  nudge_interval: 15

session_reset:
  mode: both
  idle_minutes: 720  # 12 horas
  at_hour: 4

agent:
  max_turns: 30
  reasoning_effort: "low"
  restart_drain_timeout: 30   # Esperar 30s para terminar antes de reiniciar

display:
  tool_progress: new
  interim_assistant_messages: false
  busy_input_mode: queue      # Guardar mensajes durante restart, no perderlos
