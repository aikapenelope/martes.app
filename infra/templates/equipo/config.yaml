# martes.app — Template Equipo ($100/mo)
# 2 plataformas (Telegram + Discord), DeepSeek V4, toolset completo oficina
# Balance entre funcionalidad y costo

model:
  provider: openrouter
  default: deepseek/deepseek-chat
  base_url: "https://openrouter.ai/api/v1"

platform_toolsets:
  telegram: [web, memory, todo, cronjob, clarify, vision, skills]
  discord: [web, memory, todo, cronjob, clarify, vision, skills]

skills:
  creation_nudge_interval: 15

compression:
  enabled: true
  threshold: 0.40
  target_ratio: 0.20
  protect_last_n: 15

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10

session_reset:
  mode: both
  idle_minutes: 1440  # 24 horas
  at_hour: 4

agent:
  max_turns: 50
  reasoning_effort: "medium"

# Firecrawl para web scraping
browser:
  provider: firecrawl
  inactivity_timeout: 60

display:
  tool_progress: all
  interim_assistant_messages: true
  cleanup_progress: true
  busy_input_mode: queue      # Guardar mensajes durante restart

agent:
  restart_drain_timeout: 60
