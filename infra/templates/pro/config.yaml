# martes.app — Template Pro ($200/mo)
# Todas las plataformas, Claude Haiku, capacidades completas
# Maximo rendimiento, browser automation, code execution
# Hermes v0.14.0 production config

# =============================================================================
# LLM — Claude Haiku (mejor razonamiento que DeepSeek para tareas complejas)
# =============================================================================
model:
  provider: openrouter
  default: anthropic/claude-3.5-haiku
  base_url: "https://openrouter.ai/api/v1"

# =============================================================================
# Toolsets — TODO habilitado excepto terminal directo
# =============================================================================
# Usa presets completos que incluyen: web, terminal, file, browser, vision,
# image_gen, tts, skills, todo, cronjob, memory, session_search, delegate,
# execute_code, send_message
# Terminal esta en el preset pero sandboxed via Docker backend (ver abajo)
platform_toolsets:
  telegram: [hermes-telegram]
  discord: [hermes-discord]
  whatsapp: [hermes-whatsapp]

# =============================================================================
# Security — lazy installs permitidos (Pro tiene mas libertad)
# =============================================================================
security:
  allow_lazy_installs: true   # Pro puede instalar backends bajo demanda

# =============================================================================
# Terminal — Docker sandbox (NO local, aislado del host)
# =============================================================================
terminal:
  backend: "docker"
  cwd: "/workspace"
  timeout: 180
  lifetime_seconds: 300
  docker_image: "nikolaik/python-nodejs:python3.11-nodejs20"
  docker_run_as_host_user: false
  container_cpu: 1
  container_memory: 2048     # 2GB para el sandbox
  container_disk: 10240      # 10GB
  container_persistent: true  # Preservar filesystem entre sesiones

# =============================================================================
# Streaming
# =============================================================================
streaming:
  enabled: true
  edit_interval: 0.3
  buffer_threshold: 40

# =============================================================================
# Compression — standard (Claude tiene 200K context, no necesita ser agresivo)
# =============================================================================
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20
  protect_first_n: 3

# =============================================================================
# Prompt Caching — 1 hora (Claude soporta cross-session cache)
# =============================================================================
prompt_caching:
  cache_ttl: "1h"

# =============================================================================
# Memory — limites completos
# =============================================================================
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

# =============================================================================
# Session Reset
# =============================================================================
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

group_sessions_per_user: true

# =============================================================================
# Agent behavior — maximo rendimiento
# =============================================================================
agent:
  max_turns: 60
  reasoning_effort: "medium"

# =============================================================================
# Tool Loop Guardrails — mas permisivo (Pro users saben lo que hacen)
# =============================================================================
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: true
  warn_after:
    exact_failure: 3
    same_tool_failure: 4
    idempotent_no_progress: 3
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5

# =============================================================================
# Code Execution — habilitado con limites
# =============================================================================
code_execution:
  timeout: 60               # 60s max por script (vs 300 default)
  max_tool_calls: 30

# =============================================================================
# Delegation — subagentes habilitados
# =============================================================================
delegation:
  max_iterations: 40
  max_spawn_depth: 1        # Solo 1 nivel de sub-agentes
  max_concurrent_children: 2

# =============================================================================
# Browser — Playwright (full automation)
# =============================================================================
browser:
  inactivity_timeout: 120

# =============================================================================
# STT
# =============================================================================
stt:
  enabled: true
  local:
    model: "small"          # Modelo mas preciso para Pro

# =============================================================================
# Skills
# =============================================================================
skills:
  creation_nudge_interval: 10  # Sugerir crear skills frecuentemente

# =============================================================================
# Display
# =============================================================================
display:
  tool_progress: all
  interim_assistant_messages: true
  cleanup_progress: true
  show_reasoning: false     # El usuario puede activar con /reasoning show
