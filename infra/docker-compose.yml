services:

  # ==========================================================================
  # PostgreSQL con pgvector
  # Imagen oficial de Agno: https://docs.agno.com/runtime/deploy
  # Datos en host volume para persistencia entre redeploys de Coolify.
  # Sin container_name — Coolify gestiona el nombre del container.
  # Sin custom networks — Coolify crea red aislada por stack automáticamente.
  # Ref: https://coolify.io/docs/applications/build-packs/docker-compose
  # ==========================================================================
  db:
    image: agnohq/pgvector:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: martes
      POSTGRES_PASSWORD: ${PG_PASSWORD:?}
      POSTGRES_DB: martes
    volumes:
      - /var/lib/martes/pg-data:/var/lib/postgresql
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U martes -d martes"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_statement=ddl"
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================================================
  # Meta-agente Agno AgentOS
  # Puerto 7777 interno, expuesto en 8000 via Tailscale (patrón Agno estándar).
  # AGENT_OS_HOST=0.0.0.0 requerido en containers.
  # Ref: https://docs.agno.com/agent-os/overview
  # Dominio api.martes.app se configura en Coolify UI (no en labels).
  # Ref: https://coolify.io/docs/knowledge-base/docker/compose (sección Domains)
  # ==========================================================================
  meta-agent:
    image: ghcr.io/aikapenelope/martes-meta-agent:latest
    restart: unless-stopped
    ports:
      - "100.104.89.128:8000:7777"   # AgentOS API via Tailscale — solo interfaz Tailscale
    environment:
      DATABASE_URL: postgresql+psycopg://martes:${PG_PASSWORD:?}@db:5432/martes
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?}
      TELEGRAM_TOKEN: ${META_AGENT_TELEGRAM_TOKEN:?}
      # TELEGRAM_WEBHOOK_SECRET_TOKEN: requerido por Agno en APP_ENV=production
      # Valida header X-Telegram-Bot-Api-Secret-Token en cada webhook.
      # Ref: https://docs.agno.com/agent-os/interfaces/telegram/introduction
      TELEGRAM_WEBHOOK_SECRET_TOKEN: ${TELEGRAM_WEBHOOK_SECRET_TOKEN:?}
      # AGENT_OS_HOST requerido para containers — ref: https://docs.agno.com/agent-os/overview
      AGENT_OS_HOST: "0.0.0.0"
      APP_ENV: production
      TENANTS_BASE_PATH: /var/lib/martes/tenants
      HERMES_IMAGE: nousresearch/hermes-agent:0.14.0
      TEMPLATES_PATH: /app/infra/templates
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Docker SDK para gestionar containers de tenants
      - /var/lib/martes/tenants:/var/lib/martes/tenants
      - /var/lib/martes/meta-agent:/var/lib/martes/meta-agent
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7777/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
