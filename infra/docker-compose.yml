services:

  # ==========================================================================
  # PostgreSQL con pgvector (imagen oficial de Agno)
  # Datos en /var/lib/martes/pg-data (volumen host, persistente entre redeploys)
  # ==========================================================================
  db:
    image: agnohq/pgvector:18
    container_name: martes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: martes
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: martes
    volumes:
      - /var/lib/martes/pg-data:/var/lib/postgresql
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U martes -d martes"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_statement=ddl"
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================================================
  # Meta-agente Agno (AgentOS + Telegram)
  # Coolify gestiona el routing HTTPS hacia api.martes.app → :7777
  # El binding de Tailscale permite acceso directo a la AgentOS API interna
  # ==========================================================================
  meta-agent:
    image: ghcr.io/aikapenelope/martes-meta-agent:latest
    container_name: martes-meta
    restart: unless-stopped
    ports:
      - "100.104.89.128:8000:7777"   # AgentOS API via Tailscale — puerto 8000 estándar de Agno
    environment:
      DATABASE_URL: postgresql+psycopg://martes:${PG_PASSWORD}@db:5432/martes
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TELEGRAM_TOKEN: ${META_AGENT_TELEGRAM_TOKEN}
      APP_ENV: production
      TENANTS_BASE_PATH: /var/lib/martes/tenants
      HERMES_IMAGE: nousresearch/hermes-agent:0.14.0
      TEMPLATES_PATH: /app/infra/templates
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Para gestionar containers de tenants
      - /var/lib/martes/tenants:/var/lib/martes/tenants
      - /var/lib/martes/meta-agent:/var/lib/martes/meta-agent
    depends_on:
      db:
        condition: service_healthy
    networks:
      - platform-net
      - tenant-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7777/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

# ==========================================================================
# Redes
# platform-net: comunicación interna db <-> meta-agent
# tenant-net:   red compartida con los containers de tenants Hermes
#               marcada external para que Coolify no la recree en redeploys
# ==========================================================================
networks:
  platform-net:
    name: martes-platform

  tenant-net:
    name: martes-tenants
    external: true   # Pre-creada por cloud-init; no se toca en redeploys
